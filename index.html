<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1F4A3B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Teologia em Minutos" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.json" />
<title>Teologia em Minutos — Igreja Vidas</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@400;500;600&display=swap');

:root{
  --bg:#EFE7D7; --card:#FBF7EF; --card2:#F6F0E4;
  --green:#1F4A3B; --green-d:#173A2E; --gold:#BF9B49; --gold-d:#A8842F;
  --ink:#2C2A24; --muted:#8A8270; --soft:#E4EAE2; --line:#E8DECB;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fc:'Cinzel',Georgia,serif;
  --fu:'Jost',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.tm-root{
  display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:22px 14px;
  background:
    radial-gradient(120% 90% at 80% -10%, #f1e9d9 0%, #e7ddca 55%, #ddd0b8 100%);
  font-family:var(--fu);color:var(--ink);
}
.tm-phone{
  position:relative;width:100%;max-width:412px;height:min(880px,92vh);
  background:var(--bg);border-radius:34px;overflow:hidden;
  box-shadow:0 30px 70px rgba(40,30,10,.28), 0 2px 0 rgba(255,255,255,.4) inset;
  display:flex;flex-direction:column;
}
.tm-scroll{flex:1;overflow-y:auto;padding:20px 18px 96px;}
.tm-scroll::-webkit-scrollbar{width:0;}

/* header */
.tm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.tm-greet{display:flex;gap:10px;align-items:center;}
.tm-avatar{width:34px;height:34px;border-radius:10px;background:var(--card);
  display:flex;align-items:center;justify-content:center;color:var(--green);
  border:1px solid var(--line);}
.tm-greet-1{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--green);line-height:1;}
.tm-greet-2{font-size:12px;color:var(--muted);margin-top:3px;}

/* title */
.tm-title{display:flex;flex-direction:column;align-items:center;margin:14px 0 16px;}
.tm-title.sm{margin:10px 0 8px;}
.tm-title-1{font-family:var(--fd);font-weight:600;font-size:46px;color:var(--green);line-height:.9;}
.tm-title-2{font-family:var(--fd);font-weight:500;font-style:italic;font-size:34px;color:var(--gold-d);line-height:1;}
.tm-rule{margin-top:8px;width:120px;border-top:1px solid var(--gold);position:relative;}
.tm-diamond{position:absolute;top:-11px;left:50%;transform:translateX(-50%);color:var(--gold);font-size:9px;background:var(--bg);padding:0 6px;}

/* cards */
.tm-card{background:var(--card);border-radius:22px;border:1px solid rgba(231,222,203,.8);
  box-shadow:0 8px 22px rgba(60,45,15,.06);}
.tm-qcard{padding:20px 18px 16px;position:relative;margin-bottom:14px;}
.tm-quote{color:var(--gold);opacity:.85;margin-bottom:4px;}
.tm-input{width:100%;border:none;outline:none;resize:none;background:transparent;
  font-family:var(--fd);font-size:24px;font-weight:600;color:var(--green);line-height:1.2;}
.tm-input::placeholder{color:var(--green);opacity:.92;}
.tm-qrow{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-top:14px;}
.tm-hint{display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--muted);white-space:pre-line;line-height:1.25;}
.tm-mic{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--card2);
  color:var(--green);display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;transition:.2s;}
.tm-mic.on{background:var(--green);color:#fff;border-color:var(--green);animation:pulse 1.1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(31,74,59,.4);}50%{box-shadow:0 0 0 7px rgba(31,74,59,0);}}
.tm-send{display:flex;align-items:center;gap:8px;background:var(--green);color:#fff;border:none;
  padding:13px 18px;border-radius:30px;font-family:var(--fu);font-size:14px;font-weight:500;cursor:pointer;
  box-shadow:0 6px 14px rgba(31,74,59,.28);transition:.2s;white-space:nowrap;}
.tm-send:hover{background:var(--green-d);}
.tm-send:disabled{opacity:.5;cursor:default;box-shadow:none;}
.tm-micnote{margin-top:10px;font-size:12px;color:var(--gold-d);}

/* pills */
.tm-pills{display:flex;gap:5px;margin-bottom:18px;}
.tm-pill{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:4px;
  padding:10px 3px;border-radius:22px;border:1px solid var(--line);background:var(--card);color:var(--ink);
  font-family:var(--fu);font-size:11.5px;cursor:pointer;white-space:nowrap;transition:.18s;}
.tm-pill svg{flex:0 0 auto;}
.tm-pill.sel{background:var(--green);color:#fff;border-color:var(--green);box-shadow:0 5px 12px rgba(31,74,59,.25);}

/* section */
.tm-section{display:flex;justify-content:space-between;align-items:baseline;margin:2px 2px 10px;}
.tm-section-t{font-family:var(--fd);font-weight:600;font-size:20px;color:var(--ink);}

/* recursos */
.tm-res{display:flex;gap:8px;margin-bottom:18px;}
.tm-restile{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:13px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;
  color:var(--green);cursor:pointer;font-family:var(--fu);font-size:9.5px;line-height:1.15;text-align:center;transition:.18s;}
.tm-restile span{color:var(--muted);}
.tm-restile.act{background:var(--green);color:#fff;border-color:var(--green);}
.tm-restile.act span{color:#fff;}
.tm-restile.off{opacity:.4;cursor:default;}
.tm-restile:not(.off):hover{border-color:var(--gold);}

/* answer */
.tm-answer{padding:18px 17px;margin-bottom:14px;}
.tm-answer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tm-spark{display:flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:600;font-size:17px;color:var(--ink);}
.tm-spark svg{color:var(--gold);}
.tm-tag{font-size:11px;background:var(--soft);color:var(--green-d);padding:4px 11px;border-radius:20px;font-weight:500;}
.tm-qasked{font-family:var(--fd);font-style:italic;font-size:16px;color:var(--green);margin-bottom:10px;}
.tm-md{font-family:var(--fd);font-size:18px;line-height:1.5;color:var(--ink);}
.tm-p{margin:0 0 10px;}
.tm-h3{font-family:var(--fd);font-weight:600;font-size:20px;color:var(--green);margin:14px 0 6px;}
.tm-h4{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--gold-d);margin:12px 0 4px;}
.tm-ul{margin:0 0 10px;padding-left:20px;}
.tm-ul li{margin-bottom:5px;}
.tm-md strong{color:var(--green-d);font-weight:600;}
.tm-ref{display:inline-flex;align-items:center;gap:7px;margin-top:6px;color:var(--gold-d);
  font-family:var(--fu);font-size:13px;font-weight:500;}
.tm-err{color:#9a3b2f;font-family:var(--fu);font-size:14px;}

/* loading */
.tm-loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 0;color:var(--muted);font-family:var(--fd);font-style:italic;font-size:16px;}
.tm-loading{flex-direction:row;flex-wrap:wrap;justify-content:center;}
.tm-loading>div{width:100%;text-align:center;}
.tm-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:bounce 1s infinite;}
.tm-dot:nth-child(2){animation-delay:.15s;}.tm-dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.5;}40%{transform:scale(1);opacity:1;}}

/* verses */
.tm-vsubject{font-family:var(--fd);font-style:italic;font-size:16px;color:var(--green);margin-bottom:12px;}
.tm-vloading{font-family:var(--fd);font-style:italic;color:var(--muted);font-size:15px;padding:6px 0;}
.tm-verse{margin-bottom:14px;}
.tm-verse-ref{display:flex;align-items:center;gap:5px;font-family:var(--fu);font-size:12px;font-weight:600;color:var(--gold-d);margin-bottom:2px;}
.tm-verse-txt{font-family:var(--fd);font-size:17px;color:var(--ink);line-height:1.45;}

/* footnote */
.tm-footnote{text-align:center;font-family:var(--fd);font-style:italic;font-size:14px;
  color:var(--muted);line-height:1.5;margin:6px 8px 4px;}

/* explorar */
.tm-lead{color:var(--muted);font-size:13px;margin:0 2px 14px;}
.tm-expgroup{margin-bottom:16px;}
.tm-expcat{font-family:var(--fd);font-weight:600;font-size:17px;color:var(--gold-d);margin-bottom:8px;}
.tm-expitem{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;
  background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:8px;
  font-family:var(--fd);font-size:17px;color:var(--green);cursor:pointer;text-align:left;transition:.18s;}
.tm-expitem:hover{border-color:var(--gold);}
.tm-expitem svg{color:var(--gold-d);flex:0 0 auto;}

/* favoritos */
.tm-empty{display:flex;flex-direction:column;align-items:center;gap:12px;padding:50px 20px;color:var(--muted);text-align:center;}
.tm-empty svg{color:var(--gold);opacity:.6;}
.tm-empty p{font-family:var(--fd);font-size:16px;line-height:1.5;}
.tm-empty.sm{padding:24px;}
.tm-favcard{display:flex;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px 14px;margin-bottom:10px;}
.tm-favmain{flex:1;background:none;border:none;text-align:left;cursor:pointer;min-width:0;}
.tm-favq{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--green);margin-bottom:4px;}
.tm-favref{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--gold-d);font-weight:500;margin-bottom:6px;}
.tm-favsnip{font-family:var(--fd);font-size:15px;color:var(--muted);line-height:1.4;}
.tm-favdel{background:none;border:none;color:var(--muted);cursor:pointer;flex:0 0 auto;align-self:flex-start;padding:4px;}
.tm-favdel:hover{color:#9a3b2f;}

/* perfil */
.tm-profile{padding:24px 18px;display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:12px;}
.tm-pname{font-family:var(--fd);font-weight:600;font-size:26px;color:var(--green);margin-top:10px;}
.tm-pchurch{font-family:var(--fc);font-size:12px;letter-spacing:2px;color:var(--gold-d);text-transform:uppercase;margin-top:2px;}
.tm-pdesc{font-family:var(--fd);font-size:16px;color:var(--muted);line-height:1.5;margin:12px 0 14px;}
.tm-pbadges{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.tm-pbadge{font-size:11px;background:var(--soft);color:var(--green-d);padding:5px 12px;border-radius:20px;}
.tm-pref{padding:16px 16px;margin-bottom:12px;}
.tm-pref-t{font-family:var(--fd);font-weight:600;font-size:17px;color:var(--ink);margin-bottom:10px;}
.tm-pstats{display:flex;gap:10px;}
.tm-pstats>div{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;text-align:center;}
.tm-pstats b{font-family:var(--fd);font-size:28px;color:var(--green);display:block;}
.tm-pstats span{font-size:12px;color:var(--muted);}

/* overlay / history */
.tm-overlay{position:absolute;inset:0;background:rgba(30,20,5,.35);display:flex;align-items:flex-end;z-index:30;animation:fade .2s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.tm-sheet{width:100%;background:var(--bg);border-radius:24px 24px 0 0;max-height:72%;display:flex;flex-direction:column;animation:up .25s;}
@keyframes up{from{transform:translateY(40px);}to{transform:translateY(0);}}
.tm-sheet-h{display:flex;justify-content:space-between;align-items:center;padding:18px 18px 12px;}
.tm-sheet-h span{display:flex;align-items:center;gap:8px;font-family:var(--fd);font-weight:600;font-size:20px;color:var(--green);}
.tm-sheet-h button{background:none;border:none;color:var(--muted);cursor:pointer;}
.tm-sheet-body{overflow-y:auto;padding:0 18px 24px;}
.tm-histitem{width:100%;display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:13px 14px;margin-bottom:8px;font-family:var(--fd);font-size:16px;color:var(--green);
  cursor:pointer;text-align:left;}
.tm-histitem svg{color:var(--gold-d);flex:0 0 auto;}

/* bottom nav */
.tm-nav{position:absolute;bottom:0;left:0;right:0;height:74px;background:var(--card);
  border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-around;
  padding:0 6px;box-shadow:0 -4px 16px rgba(60,45,15,.06);}
.tm-navbtn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted);font-family:var(--fu);font-size:10.5px;cursor:pointer;flex:1;transition:.18s;}
.tm-navbtn.on{color:var(--green);}
.tm-navplus{width:54px;height:54px;border-radius:50%;background:var(--green);color:#fff;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:-16px;flex:0 0 auto;
  box-shadow:0 8px 18px rgba(31,74,59,.35);transition:.2s;}
.tm-navplus:hover{background:var(--green-d);}
.tm-sharebox{width:100%;min-height:170px;border:1px solid var(--line);border-radius:14px;background:var(--card);
  padding:12px;font-family:var(--fd);font-size:15px;color:var(--ink);line-height:1.45;resize:none;outline:none;margin-bottom:12px;}
.tm-copybtn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--green);color:#fff;
  border:none;padding:14px;border-radius:28px;font-family:var(--fu);font-size:14px;font-weight:500;cursor:pointer;}
.tm-copybtn:hover{background:var(--green-d);}

/* botão de tema no cabeçalho */
.tm-headright{display:flex;align-items:center;gap:10px;}
.tm-theme-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--card);
  color:var(--gold-d);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s;}
.tm-theme-btn:hover{border-color:var(--gold);}

/* ===== MODO ESCURO ===== */
html.dark{
  --bg:#16120D; --card:#211C16; --card2:#2A241B;
  --green:#7CBE9C; --green-d:#6BAE8C; --gold:#D7B665; --gold-d:#E3C57E;
  --ink:#ECE5D6; --muted:#9C9384; --soft:#28392F; --line:#342D23;
}
html.dark, html.dark body{background:#100C08;}
html.dark .tm-root{background:#100C08;}
html.dark .tm-send,
html.dark .tm-pill.sel,
html.dark .tm-navplus,
html.dark .tm-restile.act,
html.dark .tm-copybtn,
html.dark .tm-mic.on{background:#2E6B50;}
html.dark .tm-send:hover,
html.dark .tm-navplus:hover,
html.dark .tm-copybtn:hover{background:#255A42;}

/* ajustes para rodar como site/app independente */
html,body{margin:0;padding:0;background:#EFE7D7;}
@media (max-width:480px){
  .tm-root{padding:0;background:var(--bg);min-height:100dvh;}
  .tm-phone{max-width:100%;width:100%;height:100vh;height:100dvh;border-radius:0;box-shadow:none;}
}
</style>
</head>

function stripMarkdown(t) {
  return (t || "").replace(/^#{1,6}\s+/gm, "").replace(/\*\*(.*?)\*\*/g, "$1").replace(/\*(.*?)\*/g, "$1").replace(/^[-*]\s+/gm, "").replace(/`/g, "").trim();
}
function renderInline(text, kp) {
  const out = []; const regex = /(\*\*([^*]+)\*\*|\*([^*]+)\*)/g; let last = 0, m, i = 0;
  while ((m = regex.exec(text)) !== null) {
    if (m.index > last) out.push(text.slice(last, m.index));
    if (m[2] !== undefined) out.push(<strong key={kp + "b" + i}>{m[2]}</strong>);
    else if (m[3] !== undefined) out.push(<em key={kp + "i" + i}>{m[3]}</em>);
    last = m.index + m[0].length; i++;
  }
  if (last < text.length) out.push(text.slice(last));
  return out;
}
function Markdown({ text }) {
  const lines = (text || "").split("\n"); const blocks = []; let list = null;
  const flush = () => { if (list) { blocks.push(<ul className="tm-ul" key={"ul" + blocks.length}>{list.map((li, k) => <li key={k}>{renderInline(li, "li" + blocks.length + k)}</li>)}</ul>); list = null; } };
  lines.forEach((raw, idx) => {
    const t = raw.trim();
    if (!t) { flush(); return; }
    if (t.startsWith("### ")) { flush(); blocks.push(<h4 className="tm-h4" key={idx}>{renderInline(t.slice(4), "h" + idx)}</h4>); }
    else if (t.startsWith("## ")) { flush(); blocks.push(<h3 className="tm-h3" key={idx}>{renderInline(t.slice(3), "h" + idx)}</h3>); }
    else if (t.startsWith("# ")) { flush(); blocks.push(<h3 className="tm-h3" key={idx}>{renderInline(t.slice(2), "h" + idx)}</h3>); }
    else if (/^[-*]\s+/.test(t)) { if (!list) list = []; list.push(t.replace(/^[-*]\s+/, "")); }
    else { flush(); blocks.push(<p className="tm-p" key={idx}>{renderInline(t, "p" + idx)}</p>); }
  });
  flush();
  return <div className="tm-md">{blocks}</div>;
}

}

function loadLS(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch (e) { return def; } }
function saveLS(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

              <div className="tm-sheet-h"><span><Icon name="share2" size={16} /> Compartilhar</span><button onClick={() => setShareOpen(false)}><Icon name="x" size={18} /></button></div>
              <div className="tm-sheet-body">
                <textarea className="tm-sharebox" readOnly value={shareText()} />
                <button className="tm-copybtn" onClick={doCopy}>{copied ? <><Icon name="check" size={16} /> Copiado!</> : <><Icon name="share2" size={16} /> Copiar texto</>}</button>
              </div>
            </div>
          </div>
        )}

        <div className="tm-nav">
          <button className={"tm-navbtn" + (tab === "inicio" ? " on" : "")} onClick={() => setTab("inicio")}><Icon name="home" size={20} /><span>Início</span></button>
          <button className={"tm-navbtn" + (tab === "explorar" ? " on" : "")} onClick={() => setTab("explorar")}><Icon name="search" size={20} /><span>Explorar</span></button>
          <button className="tm-navplus" onClick={newQuestion}><Icon name="plus" size={24} /></button>
          <button className={"tm-navbtn" + (tab === "favoritos" ? " on" : "")} onClick={() => setTab("favoritos")}><Icon name="heart" size={20} /><span>Favoritos</span></button>
          <button className={"tm-navbtn" + (tab === "perfil" ? " on" : "")} onClick={() => setTab("perfil")}><Icon name="user" size={20} /><span>Perfil</span></button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
